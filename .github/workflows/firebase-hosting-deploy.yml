name: Deploy to Firebase Hosting

# Auto-deploys the Flutter web build to Firebase Hosting (live channel) on every
# push to main. The service-account secret is created by `firebase init
# hosting:github` (named FIREBASE_SERVICE_ACCOUNT_LUMEN_F2E07).

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LUMEN_F2E07 }}
          projectId: lumen-f2e07
          channelId: live
